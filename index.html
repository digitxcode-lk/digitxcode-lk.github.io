<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Coming Soon | digitXcode</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .countdown {
            font-size: 2rem;
            font-weight: bold;
        }
        .social-icons a {
            margin: 0 10px;
            color: white;
            font-size: 24px;
            transition: 0.3s;
        }
        .social-icons a:hover {
            color: #0d6efd;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="display-4 fw-bold">🚀 digitXcode is Coming Soon! 🚀</h1>
    <p class="lead">We're working hard to launch something amazing. Stay tuned!</p>
    
    <!-- Countdown Timer -->
    <div class="countdown my-4" id="countdown"></div>

    <!-- Social Media Links -->
    <div class="social-icons mt-4">
        <a href="https://www.facebook.com/share/18XojvSKSR"><i class="bi bi-facebook"></i></a>
        <a href="https://www.linkedin.com/company/digitxcode"><i class="bi bi-linkedin"></i></a>
        <a href="https://youtube.com/@digitxcode?si=5c8ZAINedlrbU58A"><i class="bi bi-youtube"></i></a>
    </div>
</div>

<script>
    // Countdown Timer Script
    function countdown() {
        const launchDate = new Date("March 30, 2025 00:00:00").getTime();
        const timer = setInterval(function () {
            const now = new Date().getTime();
            const distance = launchDate - now;
            if (distance < 0) {
                clearInterval(timer);
                document.getElementById("countdown").innerHTML = "We are live!";
                return;
            }
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            document.getElementById("countdown").innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;
        }, 1000);
    }
    countdown();
</script>

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

</body>
</html>
